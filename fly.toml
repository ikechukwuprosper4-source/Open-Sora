app = 'open-sora-okz1wq'
primary_region = 'iad'

[build]
  builder = 'paketobuildpacks/build-oss-heroku:20'

[env]
  PORT = '7860'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
